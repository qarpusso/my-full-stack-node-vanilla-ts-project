<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus - Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="nav">
    <div class="logo-container">
      <h1 class="logo">Focus</h1>
    </div>
    <div class="links-container">
      <ul class="nav-links">
        <li class="selected"><a href="sign-in.html">Sign In</a></li>
        <li><a href="sign-up.html">Sign Up</a></li>
      </ul>
    </div>
  </nav>

  <main class="hero">
    <div class="card bg-secondary text-light p-4 shadow" style="max-width: 400px; width: 100%;">
      <h3 class="mb-3 text-center">Sign In</h3>
      <form>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" placeholder="Enter your email" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn btn-warning text-dark w-100 fw-semibold">Login</button>
      </form>
      <p class="mt-3 text-center">
        Don’t have an account? <a href="sign-up.html" class="text-warning">Sign Up</a>
      </p>
    </div>
  </main>
</body>
</html>
