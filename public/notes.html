<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Habit & Note Tracker - index page" />
    <link rel="shortcut icon" href="./assets/focus.png" type="image/x-icon" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <title>Focus</title>
</head>

<body>
    <nav class="nav">
        <div class="logo-container">
            <h1 class="logo">Focus</h1>
        </div>
        <div class="links-container">
            <ul class="nav-links">
                <li><a href="/index.html">Home</a></li>
                <li><a href="/habits.html">Habits</a></li>
                <li class="selected"><a href="/notes.html">Notes</a></li>
            </ul>
        </div>
    </nav>
    <main>
        <main>
            <div class="container-fluid py-4">
                <div class="notes-layout">
                    <!-- SIDEBAR -->
                    <aside class="notes-sidebar" id="notesSidebar">
                        <button class="btn btn-info btn-sm w-100 mb-3 fw-semibold">
                            + New Note
                        </button>

                        <div class="note-item active">
                            <h6 class="mb-1">New Note</h6>
                            <small class="text-muted">3 Mar</small>
                        </div>

                        <div class="note-item">
                            <h6 class="mb-1">Project Ideas</h6>
                            <small class="text-muted">1 Mar</small>
                        </div>
                    </aside>

                    <!-- CONTENT -->
                    <section class="notes-content">
                        <div class="notes-header">
                            <button class="btn btn-outline-info btn-sm" id="toggleBtn">
                                ☰
                            </button>

                            <div class="d-flex gap-2">
                                <button class="btn btn-success btn-sm">Save</button>
                                <button id="previewBtn" class="btn btn-secondary btn-sm">
                                    Preview
                                </button>
                                <button class="btn btn-danger btn-sm">Delete</button>
                            </div>
                        </div>

                        <div class="note-editor">
                            <h3 class="note-title">New Note</h3>

                            <!-- EDIT MODE -->
                            <textarea id="noteInput" class="note-textarea"
                                placeholder="Write something in markdown..."></textarea>

                            <!-- PREVIEW MODE -->
                            <div id="notePreview" class="note-preview d-none"></div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </main>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
    integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
    crossorigin="anonymous"></script>
</html>
